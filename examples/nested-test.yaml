openapi: 3.0.0
info:
  title: Nested Object Test API
  version: 1.0.0
  description: Test spec with inline nested objects

components:
  schemas:
    Company:
      type: object
      description: A company with nested address
      required:
        - id
        - name
        - headquarters
      properties:
        id:
          type: integer
          format: int64
          description: Company ID
        name:
          type: string
          description: Company name
        headquarters:
          type: object
          description: Company headquarters address
          required:
            - city
          properties:
            street:
              type: string
              description: Street name
            city:
              type: string
              description: City name
            country:
              type: string
              description: Country
        satellite:
          type: object
          description: Satellite office (optional)
          properties:
            city:
              type: string
            floor:
              type: integer
