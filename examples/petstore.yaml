openapi: 3.0.0
info:
  title: Pet Store API
  version: 1.0.0
  description: A simple pet store API

paths: {}

components:
  schemas:
    Pet:
      type: object
      description: A pet in the store
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Pet name
        status:
          type: string
          description: Pet status
        tags:
          type: array
          description: Pet tags
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          description: When the pet was added
        owner:
          type: object
          description: The pet's owner
          properties:
            name:
              type: string
            phone:
              type: string
    
    User:
      type: object
      description: A user of the pet store
      required:
        - username
        - email
      properties:
        username:
          type: string
          description: Username
        email:
          type: string
          description: Email address
        active:
          type: boolean
          description: Whether the user is active
        age:
          type: integer
          format: int32
          description: User age