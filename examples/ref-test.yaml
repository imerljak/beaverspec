openapi: 3.0.0
info:
  title: Reference Test API
  version: 1.0.0
  description: Test spec with $ref properties

components:
  schemas:
    Address:
      type: object
      description: An address
      required:
        - street
        - city
      properties:
        street:
          type: string
          description: Street name
        city:
          type: string
          description: City name
        zipCode:
          type: string
          description: Zip code
    
    User:
      type: object
      description: A user with an address
      required:
        - id
        - name
        - address
      properties:
        id:
          type: integer
          format: int64
          description: User ID
        name:
          type: string
          description: User name
        address:
          $ref: '#/components/schemas/Address'
        billingAddress:
          $ref: '#/components/schemas/Address'
