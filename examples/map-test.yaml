openapi: 3.0.0
info:
  title: Map Test API
  version: 1.0.0
  description: Test spec with map types (additionalProperties)

components:
  schemas:
    StringMap:
      type: object
      description: A map with string values
      additionalProperties:
        type: string
    
    IntMap:
      type: object
      description: A map with integer values
      additionalProperties:
        type: integer
        format: int64
    
    PetMap:
      type: object
      description: A map with Pet references
      additionalProperties:
        $ref: '#/components/schemas/Pet'
    
    Pet:
      type: object
      description: A pet
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
